name: Build

# Builds the distributable plugin zip (bin/build-zip.sh: runtime files + a
# --no-dev vendor dir, dev junk stripped). On a version tag it also attaches the
# zip to the GitHub Release and deploys it to the live site; on main / manual
# runs it uploads the zip as an artifact so you can grab a current build to
# install on staging without cutting a tag.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build plugin zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # Don't ship a broken zip: the same unit suite CI runs must pass first.
      - name: Unit tests (gate)
        run: composer test:unit

      - name: Build zip
        run: bash bin/build-zip.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tagbridge-plugin
          path: dist/tagbridge.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith( github.ref, 'refs/tags/' )
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tagbridge.zip
          fail_on_unmatched_files: true

  deploy:
    name: Deploy to chinesecleavers.co.uk
    needs: build
    # Only on version tags: a tag is a release, i.e. a version bump. Tags can
    # only be pushed by collaborators with write access, so a fork PR can never
    # reach this job — and the deploy secrets live in the `production`
    # environment, unavailable to any pull_request run.
    if: startsWith( github.ref, 'refs/tags/' )
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    concurrency:
      group: deploy-chinesecleavers-tagbridge
      cancel-in-progress: false
    steps:
      - name: Download built zip
        uses: actions/download-artifact@v4
        with:
          name: tagbridge-plugin
          path: dist

      # Push the built zip to the VPS over SSH. The key is a forced-command key
      # that can ONLY run stack/bin/deploy-plugin.sh on the server: the slug is
      # passed as the command, the zip on stdin. The server installs it as uid
      # 1000 via `wp plugin install --force`, verifies the site still returns
      # 200, and auto-rolls-back on failure. Host key is pinned (no MITM).
      - name: Deploy over SSH (forced-command key)
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/tagbridge.zip
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY"     > ~/.ssh/deploy_key   && chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts  && chmod 644 ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes -o IdentitiesOnly=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes \
              "$DEPLOY_USER@$DEPLOY_HOST" "tagbridge" < dist/tagbridge.zip
          echo "Deployed tagbridge ${GITHUB_REF_NAME} to the VPS."
